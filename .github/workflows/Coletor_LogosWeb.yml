name: 🗒️ Executor NS - Engelmig

on:
  workflow_dispatch:

jobs:
  run-scripts:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install chromium --with-deps
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: 🔎 Validar dependências instaladas
        run: |
          python -c "import pandas, lxml, openpyxl, playwright; print('Dependências OK')"

      - name: 🚀 [1/2] Executar NS_LoWeb_PAULISTA
        id: paulista
        continue-on-error: true
        run: timeout 15m xvfb-run -a python -u NS_LoWeb_PAULISTA.py

      - name: ⚠️ Aviso Paulista (se falhou)
        if: steps.paulista.outcome == 'failure'
        run: echo "⚠️ [AVISO] O script de Paulista encontrou um erro ou atingiu o limite de tentativas."

      - name: 🚀 [2/2] Executar NS_LoWeb_PIRATININGA
        id: piratininga
        continue-on-error: true
        run: timeout 15m xvfb-run -a python -u NS_LoWeb_PIRATININGA.py

      - name: ⚠️ Aviso Piratininga (se falhou)
        if: steps.piratininga.outcome == 'failure'
        run: echo "⚠️ [AVISO] O script de Piratininga encontrou um erro ou atingiu o limite de tentativas."

      - name: ✅ Finalizado
        run: echo "✅ TODOS OS PROCESSOS FORAM CONCLUÍDOS!"